{% extends 'base.html' %}

{% block title %}Agregar Producto - Inventario{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Agregar Nuevo Producto</h4>
            </div>
            <div class="card-body">
                <form action="/guardar" method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre del Producto *</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" 
                               placeholder="Ej: Laptop Dell Inspiron" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="categoria" class="form-label">Categoría *</label>
                        <select class="form-select" id="categoria" name="categoria" required>
                            <option value="">Seleccione una categoría...</option>
                            <option value="Computadoras">Computadoras</option>
                            <option value="Accesorios">Accesorios</option>
                            <option value="Monitores">Monitores</option>
                            <option value="Almacenamiento">Almacenamiento</option>
                            <option value="Redes">Redes</option>
                            <option value="Software">Software</option>
                        </select>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="precio" class="form-label">Precio ($) *</label>
                            <input type="number" class="form-control" id="precio" name="precio" 
                                   step="0.01" min="0.01" placeholder="0.00" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="stock" class="form-label">Stock/Cantidad *</label>
                            <input type="number" class="form-control" id="stock" name="stock" 
                                   min="0" placeholder="0" required>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="/" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save"></i> Guardar Producto
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
